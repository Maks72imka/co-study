<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат — Co-Study</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f1f5f9; display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #e2e8f0; }
        .back-btn { text-decoration: none; color: #64748b; font-size: 1.2rem; font-weight: bold; }
        .messages-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; word-wrap: break-word; }
        .msg.incoming { background-color: white; align-self: flex-start; border: 1px solid #e2e8f0; }
        .msg.outgoing { background-color: #4f46e5; align-self: flex-end; color: white; }
        .input-area { background: white; padding: 15px; display: flex; gap: 12px; }
        .input-area input { flex-grow: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 24px; outline: none; }
        .input-area button { background-color: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 24px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="feed.html" class="back-btn">← Назад</a>
        <div><b id="chatTitle">Диалог</b></div>
    </header>

    <div class="messages-container" id="messagesContainer"></div>

    <form class="input-area" id="chatForm">
        <input type="text" id="messageInput" placeholder="Напишите сообщение..." required autocomplete="off">
        <button type="submit">Отправить</button>
    </form>

    <script>
        const SUPABASE_URL = "https://oeomhjmeaantcfznojwg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lb21oam1lYWFudGNmem5vandnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDQ3MDYsImV4cCI6MjA5NTk4MDcwNn0.MnOP_d3Qu1CLYzn8l8FW7DMFNH7lP5FILrtiyFzApWA";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const partnerId = urlParams.get('partner');
        const partnerName = urlParams.get('name') || "Собеседник";

        let myId = null;
        let myName = "Вы"; 

        async function initChat() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'auth.html'; return; }
            myId = user.id;

            if (user.user_metadata && user.user_metadata.display_name) {
                myName = user.user_metadata.display_name;
            }

            const { data: myProfile } = await _supabase.from('students').select('name').eq('user_id', myId).maybeSingle();
            if (myProfile) { myName = myProfile.name; }

            document.getElementById('chatTitle').textContent = `Чат с: ${partnerName}`;
            
            await markAsRead();
            loadMessages();
            
            setInterval(async () => {
                await markAsRead();
                loadMessages();
            }, 3000);
        }

        async function markAsRead() {
            if (!myId || !partnerId) return;
            await _supabase
                .from('messages')
                .update({ is_read: true })
                .eq('sender', partnerId)
                .eq('partner', myId)
                .eq('is_read', false);
        }

        async function loadMessages() {
            const { data } = await _supabase.from('messages').select('*');
            if (!data) return;

            const filtered = data.filter(m => 
                (m.sender === myId && m.partner === partnerId) || 
                (m.sender === partnerId && m.partner === myId)
            );

            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            filtered.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = msg.sender === myId ? 'msg outgoing' : 'msg incoming';
                msgDiv.innerHTML = `<div>${msg.text}</div>`;
                container.appendChild(msgDiv);
            });
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chatForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text) return;

            input.value = '';
            
            await _supabase.from('messages').insert([{ 
                sender: myId, 
                sender_name: myName,
                partner: partnerId, 
                partner_name: partnerName,
                text: text
            }]);
            
            loadMessages();
        });

        initChat();
    </script>
</body>
</html>
