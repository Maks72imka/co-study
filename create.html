<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать анкету — Co-Study</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding: 40px 20px; }
        .form-container { max-width: 600px; margin: 0 auto; background: white; padding: 35px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        h2 { margin-bottom: 25px; font-size: 1.6rem; color: #0f172a; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 0.9rem; color: #475569; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; }
        button { width: 100%; background-color: #10b981; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Заполните анкету напарника</h2>
        <form id="profileForm">
            <div class="form-group"><label>Ваше имя</label><input type="text" id="name" required></div>
            <div class="form-group">
                <label>Курс</label>
                <select id="course">
                    <option value="1 курс">1 курс</option>
                    <option value="2 курс">2 курс</option>
                    <option value="3 курс">3 курс</option>
                    <option value="4 курс">4 курс</option>
                </select>
            </div>
            <div class="form-group"><label>В чем вы сильны</label><input type="text" id="knows" required></div>
            <div class="form-group"><label>С чем нужна помощь</label><input type="text" id="needs" required></div>
            <div class="form-group"><label>О себе</label><textarea id="about" rows="4" required></textarea></div>
            <div class="form-group"><label>Контакты</label><input type="text" id="contact" placeholder="@telegram" required></div>
            <button type="submit">Опубликовать</button>
        </form>
        <a href="feed.html" class="back-link">← В ленту</a>
    </div>

    <script>
        const SUPABASE_URL = "https://oeomhjmeaantcfznojwg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lb21oam1lYWFudGNmem5vandnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDQ3MDYsImV4cCI6MjA5NTk4MDcwNn0.MnOP_d3Qu1CLYzn8l8FW7DMFNH7lP5FILrtiyFzApWA";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                alert("Сначала войдите в аккаунт!");
                window.location.href = 'auth.html';
                return;
            }
            if (user.user_metadata && user.user_metadata.display_name) {
                document.getElementById('name').value = user.user_metadata.display_name;
            }
        }
        checkUser();

        document.getElementById('profileForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            const { data: { user } } = await _supabase.auth.getUser();

            const newStudent = {
                name: document.getElementById('name').value,
                course: document.getElementById('course').value,
                knows: document.getElementById('knows').value,
                needs: document.getElementById('needs').value,
                about: document.getElementById('about').value,
                contact: document.getElementById('contact').value,
                user_id: user.id
            };

            const { error } = await _supabase.from('students').insert([newStudent]);
            if (error) alert(error.message);
            else window.location.href = 'feed.html';
        });
    </script>
</body>
</html>
